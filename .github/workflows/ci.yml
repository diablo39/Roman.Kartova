name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (arch + unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Kartova.slnx

      - name: Build
        run: dotnet build Kartova.slnx --configuration Release --no-restore

      - name: Test (architecture + unit + integration, all modules)
        run: dotnet test Kartova.slnx --configuration Release --no-build --verbosity normal

  images:
    name: Container images (build — Dockerfile/restore gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the real images the way docker-compose builds them (same context,
      # Dockerfiles, build args). Catches Dockerfile/restore gaps — missing csproj
      # in the COPY layer, broken restore, bad COPY paths — that arch/unit/integration
      # tests structurally cannot, because those run on the host, never in the image.
      - name: Build API + Migrator images (compose = single source of truth)
        run: docker compose build migrator api

      - name: Build web image
        run: docker build -f web/Dockerfile -t kartova/web:ci web

  stryker-config-drift:
    name: Stryker config drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate per-module + root Stryker configs match the routing manifest
        run: python3 scripts/generate-stryker-configs.py --validate

  frontend:
    name: Frontend (test + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Codegen (snapshot fallback — backend not running in CI)
        run: npm run codegen

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build

  helm:
    name: Helm (lint + template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.0"

      - name: Lint
        run: helm lint deploy/helm/kartova/ --set database.connectionString="Host=x;Database=x;Username=x;Password=x"

      - name: Template
        run: helm template deploy/helm/kartova/ --set database.connectionString="Host=x;Database=x;Username=x;Password=x" > /tmp/rendered.yaml
