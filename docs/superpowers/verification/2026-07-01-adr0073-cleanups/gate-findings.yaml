    verdict: delusion
    title: "Type-design: successor should be ApplicationId? not Guid?"
    note: "Accepted-with-reason, not applied: matches the aggregate's deliberate _id-as-raw-Guid decision (strong-typed keys break EF LINQ translation; self-ref check compares against _id). Converting would reintroduce the friction the codebase engineered away."

