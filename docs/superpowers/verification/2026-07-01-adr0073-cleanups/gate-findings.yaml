    title: "Sunset-override checkbox unreachable via UI before sunset"
    note: "LifecycleMenu disabled Decommission on beforeSunset alone, ignoring the override permission — an OrgAdmin could never open the dialog to use the override checkbox (its sole use case). Spec FE section specified the checkbox but missed the menu entry point. Threaded canOverride into LifecycleMenu. Fixed e022858; browser-confirmed + unit test added."

